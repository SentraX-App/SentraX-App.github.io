<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentra-X</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; }
  h1 { color: #1f2937; text-align: center; }
  .card { background: white; border-radius: 12px; padding: 20px; max-width: 400px; margin: 20px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
  button { width: 95%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; margin-top: 10px; }
  #result { margin-top: 16px; padding: 14px; border-radius: 8px; font-weight: bold; text-align: center; display: none; }
</style>
</head>
<body>
  <h1>Sentra-X</h1>
  <div class="card">
    <p>Enter your blood pressure reading:</p>
    <input type="number" id="systolic" placeholder="Top number (Systolic)">
    <input type="number" id="diastolic" placeholder="Bottom number (Diastolic)">
    <button onclick="checkBP()">Check My Risk</button>
    <div id="result"></div>
  </div>

<script>
function checkBP() {
  const sys = parseInt(document.getElementById('systolic').value);
  const dia = parseInt(document.getElementById('diastolic').value);
  const result = document.getElementById('result');

  if (!sys || !dia) {
    result.style.display = "block";
    result.style.background = "#eee";
    result.textContent = "Please enter both numbers.";
    return;
  }

  let level, color;
  if (sys >= 180 || dia >= 120) { level = "Hypertensive Crisis — seek medical care now"; color = "#fca5a5"; }
  else if (sys >= 140 || dia >= 90) { level = "Stage 2 Hypertension — High Risk"; color = "#fecaca"; }
  else if (sys >= 130 || dia >= 80) { level = "Stage 1 Hypertension — Caution"; color = "#fed7aa"; }
  else if (sys >= 120) { level = "Elevated — Watch"; color = "#fef08a"; }
  else { level = "Normal"; color = "#bbf7d0"; }

  result.style.display = "block";
  result.style.background = color;
  result.textContent = level;
}
</script>
</body>
</html>
