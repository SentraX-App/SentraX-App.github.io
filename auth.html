<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sentra-X Login</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
}

h1{
text-align:center;
color:#60a5fa;
}

input,button{

width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:none;
font-size:16px;

}

input{
background:#334155;
color:white;
}

button{

background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;

}

.switch{

text-align:center;
margin-top:15px;
color:#93c5fd;
cursor:pointer;

}

#signupForm{
display:none;
}

</style>

</head>


<body>


<div class="box">


<h1>Sentra-X</h1>


<form id="loginForm">

<h3>Sign In</h3>


<input id="loginEmail"
type="email"
placeholder="Email"
required>


<input id="loginPassword"
type="password"
placeholder="Password"
required>


<button>
Login
</button>


<p class="switch" id="showSignup">
Create account
</p>


<p class="switch" id="forgotPassword">
Forgot password?
</p>


</form>



<form id="signupForm">


<h3>Create Account</h3>


<input id="signupName"
placeholder="Full name"
required>


<input id="signupEmail"
type="email"
placeholder="Email"
required>


<input id="signupPassword"
type="password"
placeholder="Password"
required>


<input id="confirmPassword"
type="password"
placeholder="Confirm password"
required>


<button>
Create Account
</button>


<p class="switch" id="showLogin">
Already have an account?
</p>


</form>


</div>


<script>


document.getElementById("showSignup").onclick=function(){

document.getElementById("loginForm").style.display="none";

document.getElementById("signupForm").style.display="block";

};



document.getElementById("showLogin").onclick=function(){

document.getElementById("signupForm").style.display="none";

document.getElementById("loginForm").style.display="block";

};


</script>


<script type="module" src="auth.js"></script>


</body>

</html>
